name: Deploy

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: GCP project ID
        required: true
      region:
        description: GCP region
        required: true
        default: asia-northeast1
      slack_team_id:
        description: Slack team ID
        required: true
      slack_app_id:
        description: Slack app ID
        required: true
      target_channel_ids:
        description: Comma-separated Slack public channel IDs
        required: true
      target_user_ids:
        description: Comma-separated Slack user IDs whose messages should receive reactions
        required: true
      dry_run:
        description: Run without calling Slack reactions.add
        required: true
        default: "true"
      gemini_unpaid_terms_acknowledged:
        description: Acknowledge Gemini unpaid service terms
        required: true
        default: "false"
      emoji_config_path:
        description: Emoji catalog path inside the container
        required: true
        default: /app/config/emoji.default.yaml
      image_version_tag:
        description: Optional release image tag, for example v0.1.0
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm validate:config
      - run: pnpm scan:sensitive
      - run: pnpm scan:production
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
      - run: terraform -chdir=infra/terraform init
      - run: terraform -chdir=infra/terraform apply -auto-approve -target=google_project_service.required -target=google_artifact_registry_repository.repo -target=google_secret_manager_secret.secrets -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "target_user_ids=${{ inputs.target_user_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "emoji_config_path=${{ inputs.emoji_config_path }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: gcloud auth configure-docker "${{ inputs.region }}-docker.pkg.dev" --quiet
      - run: |
          if [ -n "$EMOJI_LOCAL_CONFIG_YAML" ]; then
            printf '%s\n' "$EMOJI_LOCAL_CONFIG_YAML" > config/emoji.local.yaml
            node --import tsx -e "import { loadEmojiConfig } from './src/config/emoji-config.ts'; loadEmojiConfig('config/emoji.local.yaml');"
          elif [ "${{ inputs.emoji_config_path }}" = "/app/config/emoji.local.yaml" ]; then
            echo "EMOJI_LOCAL_CONFIG_YAML secret is required when emoji_config_path points at config/emoji.local.yaml" >&2
            exit 1
          fi
        env:
          EMOJI_LOCAL_CONFIG_YAML: ${{ secrets.EMOJI_LOCAL_CONFIG_YAML }}
      - run: |
          image="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot"
          docker_args=(-t "$image:${{ github.sha }}")
          if [ -n "${{ inputs.image_version_tag }}" ]; then
            if [[ ! "${{ inputs.image_version_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "image_version_tag must look like vMAJOR.MINOR.PATCH" >&2
              exit 1
            fi
            docker_args+=(-t "$image:${{ inputs.image_version_tag }}")
          fi
          docker build "${docker_args[@]}" .
      - run: docker push "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: |
          if [ -n "${{ inputs.image_version_tag }}" ]; then
            docker push "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ inputs.image_version_tag }}"
          fi
      - run: terraform -chdir=infra/terraform plan -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "target_user_ids=${{ inputs.target_user_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "emoji_config_path=${{ inputs.emoji_config_path }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: terraform -chdir=infra/terraform apply -auto-approve -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "target_user_ids=${{ inputs.target_user_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "emoji_config_path=${{ inputs.emoji_config_path }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: |
          receiver_url="$(terraform -chdir=infra/terraform output -raw receiver_url)"
          curl --fail --silent --show-error "$receiver_url/livez"
          worker_ready="$(gcloud run services describe slack-emoji-bot-worker --project="${{ inputs.project_id }}" --region="${{ inputs.region }}" --format='value(status.conditions[0].status)')"
          test "$worker_ready" = "True"
          echo "Receiver URL=$receiver_url" >> "$GITHUB_STEP_SUMMARY"
