name: Deploy

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: GCP project ID
        required: true
      region:
        description: GCP region
        required: true
        default: asia-northeast1
      slack_team_id:
        description: Slack team ID
        required: true
      slack_app_id:
        description: Slack app ID
        required: true
      target_channel_ids:
        description: Comma-separated Slack public channel IDs
        required: true
      dry_run:
        description: Run without calling Slack reactions.add
        required: true
        default: "true"
      gemini_unpaid_terms_acknowledged:
        description: Acknowledge Gemini unpaid service terms
        required: true
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm validate:config
      - run: pnpm scan:sensitive
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
      - run: terraform -chdir=infra/terraform init
      - run: terraform -chdir=infra/terraform apply -auto-approve -target=google_project_service.required -target=google_artifact_registry_repository.repo -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: gcloud auth configure-docker "${{ inputs.region }}-docker.pkg.dev" --quiet
      - run: docker build -t "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}" .
      - run: docker push "${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: terraform -chdir=infra/terraform plan -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: terraform -chdir=infra/terraform apply -auto-approve -var "project_id=${{ inputs.project_id }}" -var "region=${{ inputs.region }}" -var "slack_team_id=${{ inputs.slack_team_id }}" -var "slack_app_id=${{ inputs.slack_app_id }}" -var "target_channel_ids=${{ inputs.target_channel_ids }}" -var "dry_run=${{ inputs.dry_run }}" -var "gemini_unpaid_terms_acknowledged=${{ inputs.gemini_unpaid_terms_acknowledged }}" -var "image=${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/slack-emoji-bot/slack-emoji-bot:${{ github.sha }}"
      - run: |
          receiver_url="$(terraform -chdir=infra/terraform output -raw receiver_url)"
          worker_url="$(terraform -chdir=infra/terraform output -raw worker_url)"
          curl --fail --silent --show-error "$receiver_url/healthz"
          token="$(gcloud auth print-identity-token --audiences="$worker_url")"
          curl --fail --silent --show-error -H "Authorization: Bearer $token" "$worker_url/healthz"
          echo "Receiver URL=$receiver_url" >> "$GITHUB_STEP_SUMMARY"
