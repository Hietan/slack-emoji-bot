<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Emoji Bot demo placeholder</title>
  <desc id="desc">A placeholder panel for a future screenshot showing a test Slack message with three bot reactions.</desc>
  <rect width="960" height="540" fill="#f7f7f8"/>
  <rect x="80" y="72" width="800" height="396" rx="8" fill="#ffffff" stroke="#d7d7dc"/>
  <rect x="80" y="72" width="800" height="56" rx="8" fill="#4a154b"/>
  <text x="112" y="108" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Emoji Bot dry-run demo</text>
  <circle cx="132" cy="198" r="28" fill="#36c5f0"/>
  <text x="178" y="190" fill="#1d1c1d" font-family="Arial, sans-serif" font-size="20" font-weight="700">Test user</text>
  <text x="178" y="224" fill="#1d1c1d" font-family="Arial, sans-serif" font-size="22">This placeholder should be replaced with a safe test-workspace screenshot.</text>
  <g fill="#ffffff" stroke="#d7d7dc">
    <rect x="178" y="270" width="92" height="42" rx="21"/>
    <rect x="286" y="270" width="92" height="42" rx="21"/>
    <rect x="394" y="270" width="92" height="42" rx="21"/>
  </g>
  <text x="202" y="298" fill="#1d1c1d" font-family="Arial, sans-serif" font-size="20">eyes</text>
  <text x="308" y="298" fill="#1d1c1d" font-family="Arial, sans-serif" font-size="20">memo</text>
  <text x="418" y="298" fill="#1d1c1d" font-family="Arial, sans-serif" font-size="20">bulb</text>
  <text x="112" y="414" fill="#616061" font-family="Arial, sans-serif" font-size="18">Use only synthetic content when replacing this image.</text>
</svg>
