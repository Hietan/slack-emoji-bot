_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Emoji Bot
  description: Adds three context-aware emoji reactions to configured channel messages.
  background_color: "#4A154B"

features:
  bot_user:
    display_name: Emoji Bot
    always_online: false

oauth_config:
  scopes:
    bot:
      - channels:history
      - reactions:write
      - emoji:read

settings:
  event_subscriptions:
    request_url: ${RECEIVER_URL}/slack/events
    bot_events:
      - message.channels
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
