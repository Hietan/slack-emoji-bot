version: 1
fallback:
  - eyes
  - thinking_face
  - memo

emojis:
  - name: eyes
    kind: standard
    enabled: true
    description: Neutral acknowledgement or attention.
    use_when: Announcements, sharing, review requests, or situational awareness.
    avoid_when: Personal content where attention may feel intrusive.
  - name: white_check_mark
    kind: standard
    enabled: true
    description: Completion, resolution, agreement, or confirmation.
    use_when: Completed tasks, resolved issues, or clear approvals.
    avoid_when: Unconfirmed proposals, questions, or ongoing problems.
  - name: thumbsup
    kind: standard
    enabled: true
    description: Positive acknowledgement or agreement.
    use_when: Agreement with a proposal or lightweight positive feedback.
    avoid_when: Serious incidents, failures, or distressing updates.
  - name: clap
    kind: standard
    enabled: true
    description: Recognition for effort or achievement.
    use_when: Achievements, good presentations, or useful contributions.
    avoid_when: Serious problems or unresolved failures.
  - name: tada
    kind: standard
    enabled: true
    description: Celebration of clear success.
    use_when: Releases, acceptance, awards, or completed milestones.
    avoid_when: Ambiguous updates, incidents, failures, or warnings.
  - name: sparkles
    kind: standard
    enabled: true
    description: Newness, polish, or improvement.
    use_when: New features, improvements, or creative results.
    avoid_when: Incidents, accidents, or negative reports.
  - name: bulb
    kind: standard
    enabled: true
    description: Ideas, discoveries, or suggestions.
    use_when: New proposals, research insights, or improvement ideas.
    avoid_when: Plain completion reports or clearly sad news.
  - name: thinking_face
    kind: standard
    enabled: true
    description: Reflection, uncertainty, or neutral consideration.
    use_when: Discussion, questions, decisions under consideration, or ambiguous content.
    avoid_when: Clearly celebratory updates.
  - name: question
    kind: standard
    enabled: true
    description: Question or missing information.
    use_when: Questions, specification checks, or unclear points.
    avoid_when: Completed reports with no open question.
  - name: memo
    kind: standard
    enabled: true
    description: Notes, documentation, or information sharing.
    use_when: Documents, meeting notes, procedures, or reference material.
    avoid_when: Strong celebration is the only intended tone.
  - name: speech_balloon
    kind: standard
    enabled: true
    description: Conversation, discussion, or feedback.
    use_when: Feedback requests, review discussions, or debate.
    avoid_when: One-way completion reports.
  - name: mag
    kind: standard
    enabled: true
    description: Investigation, analysis, or review.
    use_when: Cause investigation, code review, validation, or research analysis.
    avoid_when: Simple celebration.
  - name: warning
    kind: standard
    enabled: true
    description: Warning, risk, incident, or important concern.
    use_when: Incidents, security concerns, deadline risks, or cautionary notes.
    avoid_when: Minor positive updates.
  - name: information_source
    kind: standard
    enabled: true
    description: Reference information or supplemental notice.
    use_when: Procedure changes, reference links, explanatory context, or announcements.
    avoid_when: A strong emotional reaction is more appropriate.
  - name: rocket
    kind: standard
    enabled: true
    description: Progress, launch, or momentum.
    use_when: Deployments, releases, project starts, or performance improvements.
    avoid_when: Incidents, delays, or failures.
  - name: heart
    kind: standard
    enabled: true
    description: Appreciation, empathy, or support.
    use_when: Thanks, support, encouragement, or appropriate empathy.
    avoid_when: Formal technical notices only.
  - name: muscle
    kind: standard
    enabled: true
    description: Effort, persistence, or challenge.
    use_when: Difficult work, sustained effort, or improvement attempts.
    avoid_when: It could minimize a serious failure.
  - name: pray
    kind: standard
    enabled: true
    description: Thanks, request, or care.
    use_when: Polite requests, gratitude, or asking for support.
    avoid_when: Religious implications may be inappropriate.
  - name: raised_hands
    kind: standard
    enabled: true
    description: Shared celebration, encouragement, or supportive excitement.
    use_when: Good news, successful launches, team wins, or encouraging updates.
    avoid_when: Serious incidents, failures, or distressing personal news.
  - name: ok_hand
    kind: standard
    enabled: true
    description: Acceptance, readiness, or a concise positive acknowledgement.
    use_when: Plans that look acceptable, small approvals, or readiness confirmations.
    avoid_when: Sensitive topics where a casual gesture may feel dismissive.
  - name: handshake
    kind: standard
    enabled: true
    description: Agreement, collaboration, or mutual understanding.
    use_when: Decisions, partnerships, consensus, or coordinated work.
    avoid_when: Unresolved conflict or one-sided requests.
  - name: bow
    kind: standard
    enabled: true
    description: Respectful thanks, apology, or appreciation.
    use_when: Gratitude, apologies, requests for help, or acknowledging effort.
    avoid_when: Casual jokes or content where formality would feel odd.
  - name: star
    kind: standard
    enabled: true
    description: Noteworthy quality, excellence, or something worth highlighting.
    use_when: Strong contributions, polished work, useful insights, or standout results.
    avoid_when: Routine status updates or negative reports.
  - name: fire
    kind: standard
    enabled: true
    description: Strong momentum, excitement, or impressive performance.
    use_when: High-energy wins, rapid progress, or strikingly good work.
    avoid_when: Outages, accidents, anger, or anything literally involving fire or harm.
  - name: dart
    kind: standard
    enabled: true
    description: Focus, precision, goal alignment, or hitting the mark.
    use_when: Clear goals, accurate analysis, successful targeting, or concise decisions.
    avoid_when: Broad brainstorming or unresolved ambiguity.
  - name: books
    kind: standard
    enabled: true
    description: Learning, references, reading, or accumulated knowledge.
    use_when: Literature, documentation, study notes, or shared learning resources.
    avoid_when: Simple announcements with no knowledge-sharing aspect.
  - name: microscope
    kind: standard
    enabled: true
    description: Careful research, investigation, or detailed examination.
    use_when: Experiments, root-cause analysis, validation, or research details.
    avoid_when: Quick confirmations or celebratory-only updates.
  - name: test_tube
    kind: standard
    enabled: true
    description: Experimentation, testing, or trying a hypothesis.
    use_when: A/B tests, prototypes, lab work, verification, or trial runs.
    avoid_when: Finalized decisions or production incidents.
  - name: bar_chart
    kind: standard
    enabled: true
    description: Data, measurement, reporting, or quantitative results.
    use_when: Metrics, dashboards, survey results, or numerical summaries.
    avoid_when: Qualitative personal updates.
  - name: chart_with_upwards_trend
    kind: standard
    enabled: true
    description: Growth, improvement, or positive measurable movement.
    use_when: Better metrics, performance gains, adoption growth, or trend updates.
    avoid_when: Declines, ambiguous numbers, or non-quantitative updates.
  - name: calendar
    kind: standard
    enabled: true
    description: Scheduling, dates, deadlines, or event coordination.
    use_when: Meeting plans, due dates, releases, reminders, or calendar coordination.
    avoid_when: Content where timing is incidental.
  - name: pushpin
    kind: standard
    enabled: true
    description: Important note, pinned context, or something to keep visible.
    use_when: Key decisions, reminders, standing instructions, or durable references.
    avoid_when: Casual chatter or low-priority updates.
  - name: bookmark_tabs
    kind: standard
    enabled: true
    description: Saved reference, documentation, or reusable information.
    use_when: Useful links, procedures, docs, or resources to revisit later.
    avoid_when: One-off conversations with no future reference value.
  - name: hourglass_flowing_sand
    kind: standard
    enabled: true
    description: Waiting, pending work, time passing, or in-progress status.
    use_when: Ongoing tasks, delayed results, queues, pending reviews, or deadlines.
    avoid_when: Completed work or urgent incidents needing immediate action.
  - name: construction
    kind: standard
    enabled: true
    description: Work in progress, under construction, or active changes.
    use_when: Drafts, migrations, refactors, experiments, or incomplete implementation.
    avoid_when: Stable finished work or non-technical discussion.
  - name: wrench
    kind: standard
    enabled: true
    description: Fixing, maintenance, setup, or practical troubleshooting.
    use_when: Bug fixes, configuration changes, repairs, or operational maintenance.
    avoid_when: Purely celebratory updates.
  - name: rotating_light
    kind: standard
    enabled: true
    description: Urgency, alerting, incident response, or high-priority attention.
    use_when: Outages, security concerns, breaking changes, or urgent warnings.
    avoid_when: Normal reminders or lightweight announcements.
  - name: sos
    kind: standard
    enabled: true
    description: Help needed, blocked status, or request for rescue.
    use_when: Explicit requests for assistance, blockers, emergencies, or stuck work.
    avoid_when: Routine questions or low-stakes uncertainty.
  - name: sweat_smile
    kind: standard
    enabled: true
    description: Light tension, relief, awkwardness, or effort under pressure.
    use_when: Minor mishaps, close calls, tricky work, or gently self-aware updates.
    avoid_when: Serious harm, illness, conflict, or failures that need empathy.
  - name: joy
    kind: standard
    enabled: true
    description: Lighthearted laughter or playful amusement.
    use_when: Clearly harmless jokes, amusing moments, or playful team chatter.
    avoid_when: Sensitive topics, mistakes by others, or distressing updates.
  - name: nice_research
    kind: custom
    enabled: false
    description: Workspace-specific recognition for useful research.
    use_when: Paper acceptance, research results, or interesting experiments.
    avoid_when: Unverified claims or negative results that should not be minimized.
  - name: lgtm-nya
    kind: custom
    enabled: true
    description: Custom approval that says the work looks good.
    use_when: Reviews, proposals, or changes that look acceptable.
    avoid_when: Unreviewed work, open questions, or serious issues.
  - name: mita-nya
    kind: custom
    enabled: true
    description: Custom acknowledgement that the message was seen.
    use_when: Confirming awareness, quick checks, or read receipts.
    avoid_when: Emotional posts where simple visibility may feel cold.
  - name: naruhodo-nya
    kind: custom
    enabled: true
    description: Custom reaction for understanding or thoughtful agreement.
    use_when: Explanations, findings, clarifications, or persuasive reasoning.
    avoid_when: Bad news where understanding alone is not supportive.
  - name: good-nya
    kind: custom
    enabled: true
    description: Custom positive acknowledgement for solid work.
    use_when: Useful updates, good decisions, or reliable progress.
    avoid_when: Serious incidents or unresolved problems.
  - name: yoshi-nya
    kind: custom
    enabled: true
    description: Custom reaction for readiness, approval, or moving forward.
    use_when: Plans are ready, checks passed, or a next step is approved.
    avoid_when: Risky changes or ambiguous proposals.
  - name: ok-nya
    kind: custom
    enabled: true
    description: Custom concise acceptance or okay response.
    use_when: Lightweight confirmations, small approvals, or acknowledged requests.
    avoid_when: Topics that need a warmer or more detailed response.
  - name: yatta-nya
    kind: custom
    enabled: true
    description: Custom celebration for success or relief.
    use_when: Completed work, solved problems, releases, or wins.
    avoid_when: Mixed outcomes, incidents, or other people's distress.
  - name: clap-nya
    kind: custom
    enabled: true
    description: Custom applause for effort, contribution, or achievement.
    use_when: Presentations, helpful fixes, milestones, or strong contributions.
    avoid_when: Failures, warnings, or unresolved problems.
  - name: medetai-nya
    kind: custom
    enabled: true
    description: Custom congratulation for clearly happy news.
    use_when: Awards, acceptance, releases, anniversaries, or completed milestones.
    avoid_when: Ambiguous updates or anything that should not be celebrated.
  - name: dai-kansha-nya
    kind: custom
    enabled: true
    description: Custom strong gratitude and appreciation.
    use_when: Major help, generous support, careful work, or meaningful favors.
    avoid_when: Routine notices or requests that do not call for strong thanks.
  - name: thanks-nya
    kind: custom
    enabled: true
    description: Custom casual thanks.
    use_when: Helpful information, small favors, responses, or quick support.
    avoid_when: Formal incident updates or non-gratitude contexts.
  - name: onashasu-nya
    kind: custom
    enabled: true
    description: Custom friendly request or please-help reaction.
    use_when: Polite asks, handoffs, reviews requested, or help wanted.
    avoid_when: Demands, urgent incidents, or completed work.
  - name: ouen-nya
    kind: custom
    enabled: true
    description: Custom encouragement and cheering support.
    use_when: Challenging tasks, launches, attempts, or teammates trying hard.
    avoid_when: Situations where cheer could minimize distress.
  - name: eiei-o-nya
    kind: custom
    enabled: true
    description: Custom team rally or let's-go energy.
    use_when: Starting work, group efforts, pushes toward a goal, or morale boosts.
    avoid_when: Bad news, incidents, or work that needs calm caution.
  - name: donmai-nya
    kind: custom
    enabled: true
    description: Custom gentle support after a small setback.
    use_when: Minor mistakes, failed attempts, or recoverable mishaps.
    avoid_when: Serious failures, harm, or accountability-sensitive incidents.
  - name: odaijini-nya
    kind: custom
    enabled: true
    description: Custom caring response for wellness or recovery.
    use_when: Illness, fatigue, breaks, recovery, or taking care of oneself.
    avoid_when: Technical notices or topics unrelated to care.
  - name: hokkori-nya
    kind: custom
    enabled: true
    description: Custom warm and gentle positive feeling.
    use_when: Wholesome updates, kind moments, small joys, or soft appreciation.
    avoid_when: Urgent work, critique, or serious incidents.
  - name: big-love-nya
    kind: custom
    enabled: true
    description: Custom strong affection, appreciation, or team love.
    use_when: Deep thanks, supportive messages, heartfelt wins, or kind gestures.
    avoid_when: Formal technical notices or contexts where affection may be too much.
  - name: kitai-nya
    kind: custom
    enabled: true
    description: Custom anticipation or positive expectation.
    use_when: Upcoming releases, promising ideas, demos, or future plans.
    avoid_when: Completed reports or uncertain risky plans.
  - name: hirameita-nya
    kind: custom
    enabled: true
    description: Custom inspiration, insight, or sudden idea.
    use_when: New ideas, breakthroughs, clever observations, or creative proposals.
    avoid_when: Routine status updates with no insight.
  - name: think-nya
    kind: custom
    enabled: true
    description: Custom thinking or careful consideration.
    use_when: Ambiguous proposals, design tradeoffs, questions, or analysis.
    avoid_when: Clear celebrations or simple approvals.
  - name: singi-chu-nya
    kind: custom
    enabled: true
    description: Custom under-review or deliberating reaction.
    use_when: Reviews, decisions pending, proposals being evaluated, or judging options.
    avoid_when: Finished decisions or emotional support contexts.
  - name: memo-nya
    kind: custom
    enabled: true
    description: Custom note-taking or documentation reaction.
    use_when: Docs, meeting notes, procedures, references, or written summaries.
    avoid_when: Pure celebration or urgent response needed.
  - name: osirase-nya
    kind: custom
    enabled: true
    description: Custom notice or announcement reaction.
    use_when: Announcements, reminders, operational notices, or shared updates.
    avoid_when: Personal news or topics needing empathy.
  - name: chira-nya
    kind: custom
    enabled: true
    description: Custom peeking or gentle attention.
    use_when: Looking into something, watching a thread, or cautiously checking.
    avoid_when: Personal matters where peeking may feel intrusive.
  - name: jii-nya2
    kind: custom
    enabled: true
    description: Custom focused watching or close inspection.
    use_when: Monitoring, reviews, careful observation, or waiting for results.
    avoid_when: Content where scrutiny could feel uncomfortable.
  - name: komata-nya
    kind: custom
    enabled: true
    description: Custom mild trouble or uncertainty.
    use_when: Small blockers, confusing situations, or tricky questions.
    avoid_when: Severe incidents or distressing personal updates.
  - name: work-yabai-nya
    kind: custom
    enabled: true
    description: Custom intense-work or this-is-a-lot reaction.
    use_when: Heavy workload, crunch, complex tasks, or high effort.
    avoid_when: Serious burnout, health concerns, or failures needing support.
  - name: bakushou-nya
    kind: custom
    enabled: true
    description: Custom big laugh for harmless humor.
    use_when: Clearly playful jokes, funny harmless moments, or light team banter.
    avoid_when: Mistakes by others, sensitive topics, or distressing updates.
  - name: nanimo-sitenainoni-kowareta-nya
    kind: custom
    enabled: true
    description: Custom comic reaction for things breaking unexpectedly.
    use_when: Lighthearted bugs, surprising breakage, or confusing technical mishaps.
    avoid_when: Customer-impacting incidents, security issues, or serious failures.
